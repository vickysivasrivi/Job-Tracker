name: Daily DevOps Job Hunt

on:
  schedule:
    - cron: '0 7 * * *'   # 7:00 AM UTC = 8:00 AM Ireland (UTC+1)
  workflow_dispatch:       # Also run manually from GitHub Actions tab

# Give the workflow permission to commit seen_jobs.json back to the repo
permissions:
  contents: write

jobs:
  daily-automation:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install reportlab

      - name: Run daily job automation
        env:
          ANTHROPIC_KEY:  ${{ secrets.ANTHROPIC_KEY }}
          APIFY_TOKEN:    ${{ secrets.APIFY_TOKEN }}
          EMAIL_FROM:     ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO:       ${{ secrets.EMAIL_TO }}
          YOUR_RESUME:    ${{ secrets.YOUR_RESUME }}
          JOB_TITLE:      ${{ vars.JOB_TITLE }}
          JOB_LOCATION:   ${{ vars.JOB_LOCATION }}
          MIN_SCORE:      ${{ vars.MIN_SCORE }}
          TOP_N:          ${{ vars.TOP_N }}
        run: python scripts/daily_automation.py

      # Commit seen_jobs.json back to repo so duplicates are tracked across days
      - name: Save seen jobs to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_jobs.json || true
          git diff --staged --quiet || git commit -m "chore: update seen jobs [$(date -u '+%Y-%m-%d')]"
          git push || true